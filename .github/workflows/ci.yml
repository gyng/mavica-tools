name: CI

on:
  push:
    branches: [main, "claude/**"]
  pull_request:
    branches: [main]

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v4
        with:
          version: "latest"

      - name: Set up Python
        run: uv python install 3.14

      - name: Install dependencies
        run: uv sync --extra dev

      - name: Ruff lint
        run: uv run ruff check mavica_tools/ tests/

      - name: Ruff format check
        run: uv run ruff format mavica_tools/ tests/ --check

      - name: Mypy (informational)
        run: uv run mypy mavica_tools/ || true

  test:
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
      fail-fast: false

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v4
        with:
          version: "latest"

      - name: Set up Python
        run: uv python install 3.14

      - name: Install dependencies
        run: uv sync --extra dev

      - name: Build fixture disk images
        run: uv run python tests/build_fixtures.py

      - name: Run tests
        run: uv run pytest tests/ -v --tb=short

      - name: Verify CLI entry point
        run: uv run mavica --help

      - name: Verify TUI imports
        run: uv run python -c "from mavica_tools.tui.app import MavicaApp; print('TUI OK')"
