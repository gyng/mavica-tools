name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    strategy:
      matrix:
        include:
          - os: windows-latest
            artifact: mavica-tools-windows
            ext: .exe
          - os: macos-latest
            artifact: mavica-tools-mac
            ext: ""
          - os: ubuntu-latest
            artifact: mavica-tools-linux
            ext: ""

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v4
        with:
          version: "latest"

      - name: Set up Python
        run: uv python install 3.14

      - name: Install dependencies
        run: |
          uv sync
          uv pip install pyinstaller

      - name: Build binary
        run: uv run pyinstaller mavica.spec --noconfirm

      - name: Test binary
        shell: bash
        run: |
          ./dist/mavica${{ matrix.ext }} --help

      - name: Create archive (Unix)
        if: runner.os != 'Windows'
        run: |
          cd dist
          tar czf ../${{ matrix.artifact }}.tar.gz mavica${{ matrix.ext }}

      - name: Create archive (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          Compress-Archive -Path dist/mavica${{ matrix.ext }} -DestinationPath ${{ matrix.artifact }}.zip

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: |
            ${{ matrix.artifact }}.tar.gz
            ${{ matrix.artifact }}.zip

  release:
    needs: build
    runs-on: ubuntu-latest

    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            mavica-tools-windows/*.zip
            mavica-tools-mac/*.tar.gz
            mavica-tools-linux/*.tar.gz
          body: |
            ## mavica-tools ${{ github.ref_name }}

            Download the binary for your platform:
            - **Windows**: `mavica-tools-windows.zip` — unzip, run `mavica.exe`
            - **macOS**: `mavica-tools-mac.tar.gz` — extract, run `./mavica`
            - **Linux**: `mavica-tools-linux.tar.gz` — extract, run `./mavica`

            Or install via pip/uv:
            ```bash
            uv tool install mavica-tools
            pip install mavica-tools
            ```

  publish-pypi:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v4
        with:
          version: "latest"

      - name: Set up Python
        run: uv python install 3.14

      - name: Build package
        run: uv build

      - name: Publish to PyPI
        env:
          UV_PUBLISH_TOKEN: ${{ secrets.PYPI_TOKEN }}
        run: uv publish
        continue-on-error: true
