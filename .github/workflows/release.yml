name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    strategy:
      matrix:
        include:
          - os: windows-latest
            artifact: mavica-tools-windows
            ext: .exe
          - os: macos-latest
            artifact: mavica-tools-mac
            ext: ""
          - os: ubuntu-latest
            artifact: mavica-tools-linux
            ext: ""

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v4
        with:
          version: "latest"

      - name: Set up Python
        run: uv python install 3.14

      - name: Install dependencies
        run: |
          uv sync
          uv pip install pyinstaller

      - name: Build binary
        run: uv run pyinstaller mavica.spec --noconfirm

      - name: Test binary
        shell: bash
        run: |
          ./dist/mavica${{ matrix.ext }} --help

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: dist/mavica${{ matrix.ext }}

  release:
    needs: build
    runs-on: ubuntu-latest

    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4

      - name: Rename binaries
        run: |
          mv mavica-tools-windows/mavica.exe mavica-windows.exe
          mv mavica-tools-mac/mavica mavica-mac
          mv mavica-tools-linux/mavica mavica-linux

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            mavica-windows.exe
            mavica-mac
            mavica-linux
          body: |
            ## mavica-tools ${{ github.ref_name }}

            Download the binary for your platform — single file, no install needed:
            - **Windows**: `mavica-windows.exe`
            - **macOS**: `mavica-mac` (run `chmod +x mavica-mac` first)
            - **Linux**: `mavica-linux` (run `chmod +x mavica-linux` first)

            Or install via pip/uv (Python 3.14+):
            ```bash
            pip install mavica-tools
            ```

  publish-pypi:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v4
        with:
          version: "latest"

      - name: Set up Python
        run: uv python install 3.14

      - name: Build package
        run: uv build

      - name: Publish to PyPI
        env:
          UV_PUBLISH_TOKEN: ${{ secrets.PYPI_TOKEN }}
        run: uv publish
        continue-on-error: true
